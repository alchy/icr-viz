[project]
name = "piano-core"
version = "0.1.0"
description = "Pure math core for ICR Piano Spectral Editor — splines, completion, operators (IO-free)"
requires-python = ">=3.11"
dependencies = [
    "numpy>=2.0",
    "scipy>=1.13",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "hypothesis>=6.100",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["piano_core*"]
